{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl font-bold text-gray-900 mb-6">Управление ресурсами</h1>
<div class="bg-white rounded-xl shadow border overflow-hidden">
    <table class="w-full text-sm text-left">
        <thead class="bg-gray-50 text-gray-600 uppercase">
            <tr><th class="p-4">Название</th><th class="p-4">Тип</th><th class="p-4">Локация</th><th class="p-4">Статус</th><th class="p-4"></th></tr>
        </thead>
        <tbody class="divide-y">
            {% for res in resources %}
            <tr class="hover:bg-gray-50">
                <td class="p-4 font-medium">{{ res.name }}</td>
                <td class="p-4">{{ res.get_type_display }}</td>
                <td class="p-4">{{ res.location|default:"—" }}</td>
                <td class="p-4">
                    <span class="px-2 py-0.5 rounded text-xs font-medium {% if res.status == 'available' %}bg-green-100 text-green-800{% else %}bg-red-100 text-red-800{% endif %}">{{ res.get_status_display }}</span>
                </td>
                <td class="p-4">
                    <form hx-post="/api/v1/task-resources/" hx-target="#res-msg-{{ res.id }}" class="flex gap-2 items-center">
                        {% csrf_token %}
                        <input type="hidden" name="resource" value="{{ res.id }}">
                        <input type="datetime-local" name="start_time" required class="border rounded px-2 py-1 text-xs w-36">
                        <input type="datetime-local" name="end_time" required class="border rounded px-2 py-1 text-xs w-36">
                        <button class="px-2 py-1 bg-blue-600 text-white rounded text-xs hover:bg-blue-700">Забронировать</button>
                    </form>
                    <div id="res-msg-{{ res.id }}" class="text-xs text-red-500 mt-1"></div>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
