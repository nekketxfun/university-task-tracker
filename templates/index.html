<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Менеджер Задач</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h1 class="mb-4">Список задач</h1>

    <!-- Форма добавления -->
    <form action="/add" method="post" class="row g-3 mb-4">
        <div class="col-auto">
            <input type="text" name="title" class="form-control" placeholder="Название задачи" required>
        </div>
        <div class="col-auto">
            <input type="text" name="description" class="form-control" placeholder="Описание">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-primary">Добавить</button>
        </div>
    </form>

    <!-- Список задач -->
    <ul class="list-group">
        {% for task in tasks %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            <div>
                <strong class="{% if task.completed %}text-decoration-line-through text-muted{% endif %}">
                    {{ task.title }}
                </strong>
                {% if task.description %}
                    <br><small class="text-muted">{{ task.description }}</small>
                {% endif %}
            </div>
            <div>
                <form action="/toggle/{{ task.id }}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-outline-success me-1">
                        {% if task.completed %}Вернуть{% else %}Выполнить{% endif %}
                    </button>
                </form>
                <form action="/delete/{{ task.id }}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-outline-danger">Удалить</button>
                </form>
            </div>
        </li>
        {% endfor %}
    </ul>

    {% if not tasks %}
        <p class="text-center text-muted mt-3">Задач пока нет. Добавьте первую!</p>
    {% endif %}
</div>
</body>
</html>
