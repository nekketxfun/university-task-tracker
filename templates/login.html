{% extends "base.html" %}
{% block title %}Вход в систему{% endblock %}
{% block content %}
<div class="flex min-h-[80vh] items-center justify-center">
    <div class="w-full max-w-md bg-white p-8 rounded-xl shadow border">
        <h2 class="text-2xl font-bold text-gray-900 mb-6">Вход в трекер</h2>
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Логин или Email" required
                   class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <input type="password" name="password" placeholder="Пароль" required
                   class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg transition">
                Войти
            </button>
        </form>
    </div>
</div>
{% endblock %}
